set -g default-terminal "xterm-256color"
set -g default-command "zsh"
set -g @resurrect-strategy-vim "session"
set -g @resurrect-save-shell-history 'on'

# Allows for mouse interactions
set -g mouse on

# Allows vi keybindings
set-window-option -g mode-keys vi

# Remapped keybinds
# Vi selection
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

# Pane splitting
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# Maximize Pane
# bind -r m resize-pane -Z
bind -n C-f resize-pane -Z

# Rebind copy-mode
# bind -n C-s copy-mode

# Move windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1
bind-key T swap-window -t 0 # Move window to first
bind-key L swap-window -t -1 # Move window to last

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'fabioluciano/tmux-tokyo-night'
# set -g @plugin 'arcticicestudio/nord-tmux'
# set -g @plugin 'catppuccin/tmux#v2.1.3'
# set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/tmux-sessionx'

# Themes
# set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'catppuccin/tmux'

set -g @floax-bind '-n M-f'

set -g @sessionx-prefix off
set -g @sessionx-bind 'C-o'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

### Enable transparency
# set -g @theme_left_separator ''
# set -g @theme_right_separator ''
# set -g @theme_transparent_status_bar 'true'
# set -g @theme_transparent_left_separator_inverse ''
# set -g @theme_transparent_right_separator_inverse ''

# --- Kansō Zen Theme ---

# Status bar colors
set -g status-style "bg=#101010,fg=#DCD7BA"

# Command line / Message colors
set -g message-style "bg=#7E9CD8,fg=#101010,bold"

# Selection / Copy mode colors
set -g mode-style "bg=#2D4F67,fg=#DCD7BA"

# Pane borders
set -g pane-border-style "fg=#1F1F28"
set -g pane-active-border-style "fg=#7E9CD8"

# Status left (Session name)
set -g status-left-length 30
set -g status-left "#[bg=#7E9CD8,fg=#101010,bold] #S #[bg=default,fg=default] "

# Window status (Tabs)
# Inactive window
setw -g window-status-style "bg=#101010,fg=#727169"
setw -g window-status-format " #I:#W "

# Active window
setw -g window-status-current-style "bg=#1F1F28,fg=#7E9CD8,bold"
setw -g window-status-current-format " #I:#W "

# Status right (Date/Time)
set -g status-right-length 50
set -g status-right "#[fg=#727169]%Y-%m-%d #[fg=#DCD7BA]| #[fg=#DCD7BA,bold]%H:%M "

# Optional: Refresh status line more often for the clock
set -g status-interval 60

# --- Kansō Zen Theme ---

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
