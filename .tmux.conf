# Terminal with true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:Tc"

set -g default-command "zsh"
set -g @resurrect-strategy-vim "session"
set -g @resurrect-save-shell-history 'on'

# Allows for mouse interactions
set -g mouse on

# Allows vi keybindings
set-window-option -g mode-keys vi

# yazi passthrough fix
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Performance
set -sg escape-time 0
set -g history-limit 10000

# Clipboard integration
set -s set-clipboard external
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
# End agent-deck configuration

# Remapped keybinds
# Vi selection
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"

# Automatically update these environment variables
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"
bind-key R run-shell 'tmux set-environment -g DISPLAY "$DISPLAY"'

# Pane splitting
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Resize Panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Maximize Pane
# bind -r m resize-pane -Z
bind -n C-f resize-pane -Z

# Bind a key to toggle a per-session popup
# Each parent session gets its own scratch shell at _popup_<session_name>,
# preserving cwd, history, and running processes independently.
bind -n M-f if-shell -F '#{m:_popup_*,#{session_name}}' \
  'detach-client' \
  'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "tmux new-session -A -s _popup_#{session_name}"'

# Move windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1
bind-key T swap-window -t 0 # Move window to first
bind-key L swap-window -t -1 # Move window to last

bind-key -n M-n new-window

# Navigating windows
bind-key -n M-l next-window
bind-key -n M-h previous-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-prefix off
set -g @sessionx-bind 'M-o'

set -g @plugin 'ctrlmachine/tmux-amp-theme'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'

set -g pane-border-lines heavy
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=cyan,bold"

if "test ! -d ~/.tmux/plugins/tpm" \
    "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
